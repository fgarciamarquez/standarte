<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'granted',
        personalization_storage: 'denied',
        security_storage: 'granted'
      });
    </script>
    <script>
      (function() {
        if (window.location.pathname === '/') {
          var ua = navigator.userAgent.toLowerCase();
          if (ua.indexOf('googlebot') !== -1 || ua.indexOf('bingbot') !== -1 || ua.indexOf('crawler') !== -1 || ua.indexOf('spider') !== -1) return;
          
          var savedLang = localStorage.getItem('standarte_lang');
          if (savedLang === 'es') return;
          if (savedLang && savedLang !== 'es') {
            window.location.replace('/' + savedLang + '/');
            return;
          }
          if (!savedLang) {
            var browserLang = (navigator.language || navigator.userLanguage || '').substring(0, 2).toLowerCase();
            if (browserLang === 'es') return;
            var supportedLangs = ['en', 'de', 'zh', 'hi', 'pt', 'fr', 'it', 'ko'];
            if (supportedLangs.includes(browserLang)) {
              window.location.replace('/' + browserLang + '/');
            } else {
              window.location.replace('/en/');
            }
          }
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
