name: Automated Drip Campaign

on:
  schedule:
    # De lunes a viernes (1-5), a las 08, 09, 10, ... 18 horas (UTC). Sin fines de semana.
    # Nota: los cron de GitHub Actions pueden retrasarse o saltarse alguna ejecución.
    - cron: '0 8-18 * * 1-5'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  run-drip-campaign:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar script cron de OVH
        run: |
          curl -sS "https://standarte.es/admin/email_campaing/cron_drip.php?token=TKN-8f3a9b1c7d2e4"
