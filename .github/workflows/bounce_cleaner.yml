name: Automated Bounce Email Cleaner

on:
  schedule:
    # Se ejecuta todos los días a las 03:00 UTC (4:00 AM en España)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub Actions

jobs:
  clean-bounces:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Bounce Handler Cron URL
        run: |
          curl -sS "https://standarte.es/bounce-handler.php?cron=1&token=b356d78a8f192b0c95098e94a861d8a2"
